name: Create release

on:
  workflow_dispatch:
    inputs:
      swift_syntax_tag:
        description: 'The tag to base the release on from the swift-syntax repository.'
        required: true
        type: string

jobs:
  release:
    runs-on: macos-14
    env:
      GITHUB_TOKEN: ${{ github.token }}
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
    - run: .github/bootstrap.sh ${{ inputs.swift_syntax_tag }}
    - name: Tag release commit (tag only — main branch is not updated)
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add Package.swift Sources/
        git commit -m "Release ${{ inputs.swift_syntax_tag }}"
        git tag "${{ inputs.swift_syntax_tag }}"
        git push origin "${{ inputs.swift_syntax_tag }}"
    - uses: softprops/action-gh-release@v1
      with:
        draft: false
        name: ${{ inputs.swift_syntax_tag }}
        tag_name: ${{ inputs.swift_syntax_tag }}
        body: Release from swift-syntax ${{ inputs.swift_syntax_tag }}
        files: "*.xcframework.zip"
        fail_on_unmatched_files: true
